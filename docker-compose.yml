services:
  # MySQL database
  mysql:
    image: mysql:8
    container_name: sqbot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-sqbot_password}
      MYSQL_DATABASE: ${DB_NAME:-sqbot}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - sqbot-network

  # API server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: sqbot-api
    container_name: sqbot-api
    command: node --trace-warnings dist/api/index.js
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_BACKEND=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-sqbot_password}
      - DB_NAME=${DB_NAME:-sqbot}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sqbot-network

  # Discord bot service
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: sqbot-bot
    container_name: sqbot-bot
    command: node --trace-warnings dist/bot/index.js
    env_file: .env
    environment:
      - NODE_ENV=production
      - DB_BACKEND=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-sqbot_password}
      - DB_NAME=${DB_NAME:-sqbot}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sqbot-network

  # Frontend client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - API_URL=http://localhost:3001/api
    image: sqbot-client
    container_name: sqbot-client
    ports:
      - "127.0.0.1:8088:80"
    restart: unless-stopped
    networks:
      - sqbot-network

volumes:
  mysql-data:

networks:
  sqbot-network:
    driver: bridge
